name: terraform-poc-infra

# Deploys the PoC-only Azure + Confluent Cloud infrastructure (poc-infra/).
# NOT shipped to DK. Keeps a separate trigger/audit trail from the DK workflow.

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack under poc-infra/live/"
        type: choice
        required: true
        options: [azure-network, confluent-platform, azure-private-endpoints]
        default: azure-network
      action:
        description: "Terragrunt action"
        type: choice
        required: true
        options: [plan, apply, destroy]
        default: plan
  pull_request:
    paths:
      - "poc-infra/**"
      - "tools/**"
      - ".github/workflows/terraform-poc-infra.yml"

permissions:
  contents: read
  id-token: write  # needed for azure/login OIDC

jobs:
  terragrunt:
    runs-on: ubuntu-latest
    env:
      TF_VAR_confluent_cloud_api_key: ${{ secrets.CONFLUENT_CLOUD_API_KEY }}
      TF_VAR_confluent_cloud_api_secret: ${{ secrets.CONFLUENT_CLOUD_API_SECRET }}
      TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_USE_OIDC: "true"
      TARGET_STACK: ${{ github.event_name == 'workflow_dispatch' && inputs.stack || 'azure-network' }}
      TG_ACTION: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install pinned tools
        run: |
          bash tools/install.sh
          echo "${GITHUB_WORKSPACE}/tools/bin" >> "${GITHUB_PATH}"

      - name: Terragrunt init
        working-directory: poc-infra/live/${{ env.TARGET_STACK }}
        run: terragrunt init -input=false

      - name: Terragrunt ${{ env.TG_ACTION }}
        working-directory: poc-infra/live/${{ env.TARGET_STACK }}
        run: |
          case "${TG_ACTION}" in
            plan)    terragrunt plan -input=false ;;
            apply)   terragrunt apply -input=false -auto-approve ;;
            destroy) terragrunt destroy -input=false -auto-approve ;;
          esac
