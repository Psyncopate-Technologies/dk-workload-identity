name: terraform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (one of: dev, uat, prod)"
        type: choice
        required: true
        options: [dev, uat, prod]
        default: dev
      action:
        description: "Terragrunt action"
        type: choice
        required: true
        options: [plan, apply, destroy]
        default: plan
  pull_request:
    paths:
      - "terraform/**"
      - "tools/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read

jobs:
  terragrunt:
    runs-on: ubuntu-latest
    # PRs always plan against dev; workflow_dispatch uses the chosen env.
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    env:
      TF_VAR_confluent_cloud_api_key: ${{ secrets.CONFLUENT_CLOUD_API_KEY }}
      TF_VAR_confluent_cloud_api_secret: ${{ secrets.CONFLUENT_CLOUD_API_SECRET }}
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
      TG_ACTION: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned tools
        run: |
          ./tools/install.sh
          echo "${GITHUB_WORKSPACE}/tools/bin" >> "${GITHUB_PATH}"

      - name: Version check
        run: |
          terraform -version
          terragrunt -version
          confluent version
          python3.12 --version

      - name: Terragrunt init
        working-directory: terraform/live/${{ env.TARGET_ENV }}
        run: terragrunt init -input=false

      - name: Terragrunt ${{ env.TG_ACTION }}
        working-directory: terraform/live/${{ env.TARGET_ENV }}
        run: |
          case "${TG_ACTION}" in
            plan)    terragrunt plan -input=false ;;
            apply)   terragrunt apply -input=false -auto-approve ;;
            destroy) terragrunt destroy -input=false -auto-approve ;;
          esac
