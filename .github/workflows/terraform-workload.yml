name: terraform-workload

# ============================================================================
# DKP-operated workflow for the terraform/ tree.
#
# Scoped to DKP's runtime environment:
#   • Workload identity to Azure — GitHub OIDC → DKP Entra federated app
#     (no long-lived service-principal password in secrets).
#   • Confluent Cloud — API key + secret scoped to a DKP service account with
#     the minimum role bindings needed to manage workload identity resources.
#   • Remote state — Azure Storage in DKP's subscription (override the
#     TG_STATE_* env vars below if DKP's SA/RG names differ from the defaults
#     in terraform/live/root.hcl).
#
# The sibling workflow terraform-poc-workload.yml is Ayele's Confluent PS-side
# companion, used for PoC validation in Ayele's dev Confluent org. DKP can
# delete it after hand-off if they don't want two triggers.
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack directory under terraform/live/ (e.g. _org, dev, uat, prd)"
        type: choice
        required: true
        options: [_org, dev, uat, prd]
        default: dev
      action:
        description: "Terragrunt action"
        type: choice
        required: true
        options: [plan, apply, destroy]
        default: plan
  pull_request:
    paths:
      - "terraform/**"
      - "tools/**"
      - ".github/workflows/terraform-workload.yml"

permissions:
  contents: read
  id-token: write  # GitHub OIDC → DKP Entra federated app (workload identity).

jobs:
  terragrunt:
    runs-on: ubuntu-latest
    env:
      # ---- Confluent Cloud admin credentials (fetched from Azure Key Vault at plan/apply time) ----
      # The provider config generated by terraform/live/root.hcl reads secrets
      # `confluent-admin-key` and `confluent-admin-secret` from the Key Vault below
      # (DKP convention — see Rukai). No Confluent API key in GitHub secrets.
      TF_VAR_azure_key_vault_name:                ${{ vars.AZURE_KEY_VAULT_NAME }}
      TF_VAR_azure_key_vault_resource_group_name: ${{ vars.AZURE_KEY_VAULT_RESOURCE_GROUP_NAME }}

      # ---- Azure workload identity (no ARM_CLIENT_SECRET — OIDC only) ----
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_USE_OIDC:        "true"

      # ---- State backend overrides ----
      # Defaults in terraform/live/root.hcl point at Ayele's PoC storage account.
      # Set these three secrets in the DKP repo to redirect state to DKP's SA.
      TG_STATE_RESOURCE_GROUP:  ${{ secrets.TG_STATE_RESOURCE_GROUP }}
      TG_STATE_STORAGE_ACCOUNT: ${{ secrets.TG_STATE_STORAGE_ACCOUNT }}
      TG_STATE_CONTAINER:       ${{ secrets.TG_STATE_CONTAINER }}

      TARGET_STACK: ${{ github.event_name == 'workflow_dispatch' && inputs.stack || 'dev' }}
      TG_ACTION:    ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Azure login (OIDC — DKP workload identity)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install pinned tools
        run: |
          # Invoked via bash so the exec bit on install.sh isn't required —
          # file-mode bits get stripped by some copy/zip paths DKP may use
          # when importing this repo. Script reads pinned versions from
          # tools/versions.env and downloads binaries into tools/bin/.
          bash tools/install.sh
          echo "${GITHUB_WORKSPACE}/tools/bin" >> "${GITHUB_PATH}"

      - name: Version check
        run: |
          terraform -version
          terragrunt -version
          confluent version
          python3.12 --version

      - name: Terragrunt init
        working-directory: terraform/live/${{ env.TARGET_STACK }}
        run: terragrunt init -input=false --terragrunt-non-interactive

      - name: Terragrunt ${{ env.TG_ACTION }}
        working-directory: terraform/live/${{ env.TARGET_STACK }}
        # --terragrunt-non-interactive suppresses Terragrunt's own confirmation
        # prompts (e.g. the dependent-modules warning on destroy), separate from
        # Terraform's -auto-approve.
        run: |
          case "${TG_ACTION}" in
            plan)    terragrunt plan    -input=false --terragrunt-non-interactive ;;
            apply)   terragrunt apply   -input=false -auto-approve --terragrunt-non-interactive ;;
            destroy) terragrunt destroy -input=false -auto-approve --terragrunt-non-interactive ;;
          esac
